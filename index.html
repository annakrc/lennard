<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düsseldorf Entdecken</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a0010;
            --gold: #ff2d8a;
            --text: #ffe0f0;
            --glass: rgba(255, 45, 138, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(ellipse at top, #3d0030 0%, #1a0010 70%);
            color: var(--text); 
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            padding: 2rem;
        }
        header { text-align: center; margin-bottom: 4rem; }
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5rem; 
            color: var(--gold); 
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(255, 45, 138, 0.6);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--glass);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 45, 138, 0.25);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 8px 32px rgba(255, 45, 138, 0.3);
        }
        .num { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1rem; display: block; }
        h2 { font-family: 'Playfair Display', serif; margin-bottom: 0.5rem; color: #ffb3d9; }
        .label { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 1rem; }
        .badge { 
            display: inline-block; 
            background: var(--gold); 
            color: #1a0010; 
            padding: 0.2rem 0.8rem;
